server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: flight-delay-backend

# ─────────────────────────────────────────
# AI PROVIDER CONFIG
# Set AI_PROVIDER env var to switch providers
# Values: gemini | claude
# ─────────────────────────────────────────
ai:
  provider: ${AI_PROVIDER:gemini}
  gemini:
    api-key: ${GEMINI_API_KEY:REPLACE_WITH_REAL_KEY}
    model: gemini-1.5-flash
    base-url: https://generativelanguage.googleapis.com/v1beta
  claude:
    api-key: ${CLAUDE_API_KEY:REPLACE_WITH_REAL_KEY}
    model: claude-3-haiku-20240307
    base-url: https://api.anthropic.com/v1

# ─────────────────────────────────────────
# FLIGHT DATA APIs
# ─────────────────────────────────────────
aviation:
  aviationstack:
    api-key: ${AVIATIONSTACK_API_KEY:REPLACE_WITH_REAL_KEY}
    base-url: http://api.aviationstack.com/v1
  opensky:
    base-url: https://opensky-network.org/api

# ─────────────────────────────────────────
# CORS
# ─────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ─────────────────────────────────────────
# ACTUATOR (health check endpoint)
# ─────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.flightdelay: DEBUG

# ─────────────────────────────────────────
# LANGCHAIN4J
# ─────────────────────────────────────────
langchain4j:
  google-ai-gemini:
    api-key: ${GEMINI_API_KEY:REPLACE_WITH_REAL_KEY}
    model-name: gemini-1.5-flash
    temperature: 0.1
    max-output-tokens: 4096
  anthropic:
    api-key: ${CLAUDE_API_KEY:REPLACE_WITH_REAL_KEY}
    model-name: claude-3-haiku-20240307
    temperature: 0.1
    max-tokens: 4096

# ─────────────────────────────────────────
# AGENTIC FLOW (disabled by default)
# ─────────────────────────────────────────
agentic:
  enabled: ${AGENTIC_ENABLED:false}
  max-iterations: ${AGENTIC_MAX_ITER:3}
  confidence-threshold: ${AGENTIC_CONFIDENCE:0.85}
  parallel-evaluation: ${AGENTIC_PARALLEL:true}
  timeout-seconds: ${AGENTIC_TIMEOUT:25}

memory:
  agentic-max-used-percent: ${MEM_THRESHOLD:0.80}
